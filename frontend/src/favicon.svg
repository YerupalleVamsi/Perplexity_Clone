<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b26"/>
    </linearGradient>
    <linearGradient id="spark" x1="8" y1="2" x2="24" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="60%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Teal border -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="url(#spark)" stroke-opacity="0.4" stroke-width="1"/>
  <!-- Lightning spark shape -->
  <path d="M18.5 3L9 17h8l-3.5 12L23 13h-8L18.5 3z" fill="url(#spark)" filter="url(#glow)"/>
  <!-- Small accent dots -->
  <circle cx="6" cy="6" r="1.2" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="26" cy="26" r="1" fill="#5eead4" opacity="0.4"/>
</svg>
